name: Build Rear Guard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/example/rearguard
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p gradle/wrapper

          # Создаём простую иконку (1x1 пиксель PNG)
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # AndroidManifest.xml (упрощённый, без package)
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Rear Guard"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > app/src/main/java/com/example/rearguard/MainActivity.java << 'EOF'
          package com.example.rearguard;
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private TextView statusText;
              private Button startButton;
              private Handler handler = new Handler();
              private boolean isRunning = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  statusText = findViewById(R.id.statusText);
                  startButton = findViewById(R.id.startButton);

                  startButton.setOnClickListener(v -> {
                      if (!isRunning) {
                          startGuard();
                      } else {
                          stopGuard();
                      }
                  });
              }

              private void startGuard() {
                  isRunning = true;
                  startButton.setText("⏹ Остановить");
                  statusText.setText("🟢 Страж активен");
                  Toast.makeText(this, "Страж запущен!", Toast.LENGTH_SHORT).show();

                  handler.post(new Runnable() {
                      @Override
                      public void run() {
                          if (!isRunning) return;
                          executeCommands();
                          handler.postDelayed(this, 3000);
                      }
                  });
              }

              private void stopGuard() {
                  isRunning = false;
                  handler.removeCallbacksAndMessages(null);
                  startButton.setText("▶ Запустить страж");
                  statusText.setText("🔴 Страж остановлен");
                  Toast.makeText(this, "Страж остановлен", Toast.LENGTH_SHORT).show();
              }

              private void executeCommands() {
                  try {
                      String[] cmds = {
                          "settings put global sysui_phone_rotation 2",
                          "dumpsys deviceidle disable",
                          "cmd deviceidle whitelist +com.android.systemui",
                          "echo -17 > /proc/$(pgrep systemui | head -1)/oom_adj 2>/dev/null"
                      };
                      for (String cmd : cmds) {
                          Process p = Runtime.getRuntime().exec(new String[]{"sh", "-c", cmd});
                          p.waitFor();
                      }
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }
          }
          EOF

          # activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:gravity="center">
              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="⚠️ Не запущен"
                  android:textSize="18sp"
                  android:textStyle="bold"
                  android:layout_marginBottom="30dp"/>
              <Button
                  android:id="@+id/startButton"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="▶ Запустить страж"
                  android:textColor="#FFFFFF"
                  android:backgroundTint="#4CAF50"/>
          </LinearLayout>
          EOF

          # build.gradle (app)
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 34
              namespace 'com.example.rearguard'
              defaultConfig {
                  applicationId "com.example.rearguard"
                  minSdk 21
                  targetSdk 34
              }
              buildFeatures {
                  buildConfig false
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # build.gradle (project)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # settings.gradle
          echo 'include ":app"' > settings.gradle

          # gradle.properties
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          EOF

          # Скачиваем gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rear-guard
          path: app/build/outputs/apk/debug/*.apk
